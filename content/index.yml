seo:
  title: Ассоциация кооперативов
  description: Делаем сотрудничество кооперативов выгодным и предсказуемым через общие правила, сервисы и инфраструктуру
title: Ассоциация кооперативов
description: "Делаем сотрудничество кооперативов выгодным и предсказуемым через общие правила, сервисы и инфраструктуру"
hero:
  logo: '/logos/logo.svg'
  links:
    - label: Стать участником
      icon: i-lucide-magnet
      color: primary
      size: xl
      to: '#pricing'
      trailing: true
    - label: Наша концепция
      icon: i-lucide-hop
      size: xl
      color: primary
      to: '/concept'
      trailing: true
    - label: Написать нам
      icon: i-simple-icons-telegram
      size: xl
      color: 'neutral'
      variant: 'subtle'
      to: '/'
      target: _blank
      trailing: true
section:
  title: 'Цели и задачи [Ассоциации]{.text-primary}'
  description: "Ассоциация снимает «налог одиночества» с кооперативов: выносит повторяющиеся дорогие задачи в общий слой и делает межкооперативную работу предсказуемой"
  image: '/images/goals.svg'
  features:
    - title: Снизить издержки на сделки и взаимодействие
      description: Типовые договоры, общие правила и стандарты прозрачности уменьшают стоимость согласований и ошибок, ускоряют запуск совместных проектов.
      class: border-l border-primary pl-4
    - title: Дать общий слой поддержки и сервисов
      description: Юридическая и бухгалтерская взаимопомощь, ИТ и методики, обучение и база знаний, инфраструктура для закупок и координации.
      class: border-l border-default pt-4 pl-4
    - title: Удержать доверие и нормальную работу в кризисах
      description: Медиация и арбитраж по правилам сети, процедуры разбора с понятными сроками и мерами восстановления, фиксация обязательств и ответственности.
      class: border-l border-default pt-4 pl-4
steps:
  title: Используемые инструменты
  description: "Три опорных слоя сети: инициативы и проекты, рынок товаров и услуг, прозрачные взаиморасчёты и отчётность по общим сервисам"
  items:
    - title: Платформа инициатив
      description: Подача инициатив и проектов, сбор поддержки, назначение владельцев, фиксация решений и публичная история исполнения.
      image:
        light: '/images/light/connect.svg'
        dark: '/images/dark/connect.svg'
    - title: Кооперативный маркетплейс
      description: Витрина товаров и услуг сети, поиск проверенных партнёров, стандартизированные договоры и правила сделки, работающие одинаково в каждом кооперативе.
      image:
        light: '/images/light/marketplace.svg'
        dark: '/images/dark/marketplace.svg'
    - title: Прозрачная экономика
      description: Правила взносов и оплаты сервисов, взаиморасчёты, публикация бюджета и отчётности в понятном виде по каждому направлению.
      image:
        light: '/images/light/finance.svg'
        dark: '/images/dark/finance.svg'
pricing:
  title: Выбери формат [участия]{.text-primary}
  description: Два входа в сеть. Можно подключиться как специалист для работы по проектам внутри сети или как кооператив, чтобы использовать общий слой сервисов и участвовать в управлении
  plans:
    - title: Специалист
      description: Для экспертов и команд, которые хотят работать внутри сети по понятным договорам, правилам и с предсказуемым потоком задач
      features:
        - Доступ к проектам и заказам внутри сети
        - Стандартизированные договоры и правила исполнения
        - Коллективные гарантии и понятная ответственность сторон
        - Подключение к базе знаний и методикам сети
        - Процедуры разбора спорных ситуаций через медиацию и арбитраж
        - Репутация и история сделок как часть «рынка доверия»
      button:
        label: Участвовать
        color: neutral
        variant: outline
        to: '#'
    - title: Кооператив
      description: Для кооперативов, которым нужен общий слой договоров, сервисов и взаимопомощи без потери самостоятельности и собственного устава
      features:
        - Доступ к платформе, сервисам и партнёрствам сети
        - Совместные закупки и общий ресурс там, где в одиночку дорого
        - Юридическая и бухгалтерская взаимопомощь
        - Общие методики, шаблоны и процедуры для повторяющихся задач
        - Правила разбирательства споров и восстановление доверия по процедуре
        - Участие в общих решениях «один кооператив, один голос»
      button:
        label: Участвовать
        variant: subtle
        to: '#'
cta:
  title: Юридическая информация
  description: "Здесь собраны устав, порядки сети и материалы для участников: принципы, требования к прозрачности, правила использования общих средств, процедуры разбора спорных ситуаций"
  links:
    - label: Уставные документы
      to: https://docs.google.com/document/d/19cJKeW0azxMZneOpNDqqouUOUSpO5n_1fUyQS90hCQM
      target: _blank
      trailingIcon: i-lucide-scale
    - label: Для участников
      to: https://docs.google.com/document/d/19cJKeW0azxMZneOpNDqqouUOUSpO5n_1fUyQS90hCQM
      target: _blank
      variant: subtle
      trailingIcon: i-lucide-handshake
